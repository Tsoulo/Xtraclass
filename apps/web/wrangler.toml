# wrangler.toml
name = "xtraclass"
compatibility_date = "2024-12-16"

# 2. Update the directory to the full path relative to the repo root
# Since your build log shows: apps/web/build/client
[assets]
directory = "apps/web/build/client"

[build]
command = "npm run build"

[env.preview.vars]
VITE_SERVER_URL = "http://localhost:3000"

[env.production.vars]
VITE_SERVER_URL = "https://api.xtraclass.com"
