name = "xtraclass-web"
pages_build_output_dir = "dist"
compatibility_date = "2024-12-16"

# Environment variables for frontend
[env.development]
vars = { VITE_SERVER_URL = "http://localhost:3000" }

[env.production]
vars = { VITE_SERVER_URL = "https://api.xtraclass.com" }

# If using Cloudflare Functions for backend instead
[[build.watch_paths]]
paths = ["src/**/*.tsx", "src/**/*.ts"]
